name: Apply orders summary PR118 on PR

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/orders-summary-native-render' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply changes
        run: python3 .github/scripts/apply_pr118.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(orders): riepilogo disponibilità e totali senza diagnostica"
          git push origin HEAD:${{ github.head_ref }}
